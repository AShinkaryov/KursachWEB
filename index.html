<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Factory — Официальный сайт</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <aside class="sidebar">
            <div class="side-content">
                <div class="profile-icon">
                    <img src="assets/img/AMI-icon.png" alt="Logo">
                </div>

                <nav class="side-menu">
                    <a href="#">Каталог</a>
                    <a href="#">Партнерам</a>
                    <a href="#">Блог</a>
                    <a href="#">Для детей</a>
                </nav>

                <div class="cart-section">
                    <button class="cart-btn-orange">
                        <i class="fa-solid fa-cart-shopping"></i>
                    </button>
                </div>

                <div class="side-contacts">
                    <div class="social-icons">
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#"><i class="fa-brands fa-telegram"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-vk"></i></a>
                    </div>
                    
                    <a href="tel:+79990000000" class="contact-link">+7 (999) 000-00-00</a>
                    <a href="mailto:info@cookies.com" class="contact-link">info@cookies.com</a>
                    
                    <div class="lang-switcher">
                        <button class="lang-btn active">RU</button>
                        <button class="lang-btn">EN</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="slider-section">
            <div class="slides-container">
                <div class="slide active" style="background-image: url('assets/img/cookie-slide-1.jpg');">
                    <button class="btn-catalog-center">КАТАЛОГ ПЕЧЕНЮШЕК</button>
                </div>
                <div class="slide" style="background-image: url('assets/img/cookie-slide-2.png');">
                    <button class="btn-catalog-center">НОВИНКИ НЕДЕЛИ</button>
                </div>
                <div class="slide" style="background-image: url('assets/img/cookie-slide-3.jpg');">
                    <button class="btn-catalog-center">ДЕТСКОЕ МЕНЮ</button>
                </div>
                <div class="slide" style="background-image: url('assets/img/cookie-slide-4.jpg');">
                    <button class="btn-catalog-center">ПОДАРОЧНЫЕ НАБОРЫ</button>
                </div>
                <div class="slide" style="background-image: url('assets/img/cookie-slide-5.jpg');">
                    <button class="btn-catalog-center">ОТЗЫВЫ КЛИЕНТОВ</button>
                </div>
            </div>

            <div class="slider-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>

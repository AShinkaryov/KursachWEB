<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Factory — Официальный сайт</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <aside class="sidebar">
            <div class="side-content">
                <div class="profile-icon">
                    <img src="assets/AMI-icon.png" alt="Logo">
                </div>

                <nav class="side-menu">
                    <a href="#" class="nav-btn-orange">Каталог</a>
                    <a href="#">Партнерам</a>
                    <a href="#">Блог</a>
                    <a href="#">Для детей</a>
                </nav>

                <div class="cart-section">
                    <button class="cart-btn-orange">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 18C5.9 18 5.01 18.9 5.01 20C5.01 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L20.88 5.48C21.05 5.17 21.14 4.81 21.14 4.44C21.14 3.65 20.49 3 19.7 3H4.21L3.27 1H1V2ZM17 18C15.9 18 15.01 18.9 15.01 20C15.01 21.1 15.9 22 17 22C18.1 22 19 21.1 19 20C19 18.9 18.1 18 17 18Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>

                <div class="side-contacts">
                    <div class="social-icons">
                        <a href="#">IG</a><a href="#">TG</a><a href="#">FB</a><a href="#">VK</a>
                    </div>
                    <p class="contact-link">+7 (999) 000-00-00</p>
                    <p class="contact-link">info@cookies.com</p>
                    <div class="lang-switcher">
                        <button class="lang-btn active">RU</button>
                        <button class="lang-btn">EN</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="slider-section">
            <div class="slides-container">
                <div class="slide active" style="background-image: url('assets/img/cookie-slide-1.jpg');">
                    <button class="btn-catalog-center">КАТАЛОГ ПЕЧЕНЮШЕК</button>
                </div>
                <div class="slide" style="background-image: url('assets/img/cookie-slide-2.jpg');">
                    <button class="btn-catalog-center">НОВИНКИ НЕДЕЛИ</button>
                </div>
                <div class="slide" style="background-image: url('assets/img/cookie-slide-3.jpg');">
                    <button class="btn-catalog-center">ДЕТСКОЕ МЕНЮ</button>
                </div>
            </div>

            <div class="slider-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
